# Netlify deployment configuration for the CCCWA website.
# This is a buildless static site — no build command needed.

[build]
  publish = "."
  command = ""

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Always serve fresh content JSON so CMS edits show up immediately
[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
